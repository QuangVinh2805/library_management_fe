<div class="category-wrapper">
  <h2 class="category-title">Danh sách danh mục</h2>

  <div class="category-grid">
    <div
      class="category-card"
      *ngFor="let cat of categories"
      (click)="goToCategory(cat.id, cat.categoryName)"
      style="cursor: pointer;"
    >
      {{ cat.categoryName }}
      <span *ngIf="categoryCounts[cat.id] !== undefined">
        ({{ categoryCounts[cat.id] }})
      </span>
    </div>
  </div>

  <nav *ngIf="totalPages > 1" class="mt-3">
    <ul class="pagination justify-content-center">

      <li class="page-item" [class.disabled]="page === 0">
        <button class="page-link" (click)="changePage(page - 1)">«</button>
      </li>

      <li class="page-item"
          *ngFor="let p of [].constructor(totalPages); let i = index"
          [class.active]="i === page">
        <button class="page-link" (click)="changePage(i)">
          {{ i + 1 }}
        </button>
      </li>

      <li class="page-item" [class.disabled]="page === totalPages - 1">
        <button class="page-link" (click)="changePage(page + 1)">»</button>
      </li>

    </ul>
  </nav>
</div>
