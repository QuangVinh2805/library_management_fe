<div class="card shadow">

  <div class="card-header d-flex justify-content-between align-items-center">
    <span class="fw-bold">Tất cả Route</span>
    <button *ngIf="canCreate" class="btn btn-light btn-sm border" (click)="openCreateModal()">
      <i class="bi bi-plus-circle"></i> Thêm mới
    </button>
  </div>

  <div class="card-body">

    <!-- Search -->
    <div class="mb-3">
      <input type="text"
             class="form-control"
             placeholder="Tìm kiếm theo route..."
             [(ngModel)]="searchKeyword"
             (ngModelChange)="onSearchInputChange(searchKeyword)">
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-dark"></div>
    </div>

    <!-- Table -->
    <div *ngIf="!loading" class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
          <th>Route</th>
          <th>Mô tả</th>
          <th>Trạng thái</th>
          <th class="text-center" style="width: 160px;">Chức năng</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let r of routes">

          <td>{{ r.route }}</td>
          <td>{{ r.description }}</td>

          <td>
            <span [ngClass]="r.status === 1 ? 'badge bg-success' : 'badge bg-secondary'">
              {{ r.status === 1 ? 'Hoạt động' : 'Khoá' }}
            </span>
          </td>

          <td class="text-center">

            <button *ngIf="canUpdate" class="btn btn-sm btn-outline-primary me-1"
                    (click)="openEditModal(r)">
              <i class="bi bi-pencil-square"></i>
            </button>

            <button *ngIf="canChangeStatus" class="btn btn-sm btn-outline-warning"
                    (click)="toggleStatus(r.id)">
              <i class="bi"
                 [ngClass]="r.status === 1 ? 'bi-slash-circle' : 'bi-check-circle'">
              </i>
            </button>

          </td>
        </tr>
        </tbody>

      </table>

      <!-- Pagination -->
      <nav *ngIf="totalPages > 1" class="mt-3">
        <ul class="pagination justify-content-center">

          <li class="page-item" [class.disabled]="page === 0">
            <button class="page-link" (click)="changePage(page - 1)">«</button>
          </li>

          <li class="page-item"
              *ngFor="let p of [].constructor(totalPages); let i = index"
              [class.active]="i === page">
            <button class="page-link" (click)="changePage(i)">
              {{ i + 1 }}
            </button>
          </li>

          <li class="page-item" [class.disabled]="page === totalPages - 1">
            <button class="page-link" (click)="changePage(page + 1)">»</button>
          </li>

        </ul>
      </nav>
    </div>
  </div>
</div>

<!-- CREATE MODAL -->
<div class="modal fade" id="createRouteModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Thêm route mới</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Route <span class="text-danger">*</span></label>
            <input class="form-control"
                   [(ngModel)]="newRoute.route"
                   required />
          </div>

          <div class="col-md-6">
            <label class="form-label">Mô tả</label>
            <input class="form-control"
                   [(ngModel)]="newRoute.description" />
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-dark" (click)="submitCreateRoute()">Tạo mới</button>
      </div>

    </div>
  </div>
</div>

<!-- UPDATE MODAL -->
<div class="modal fade" id="updateRouteModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <ng-container *ngIf="editRoute">

        <div class="modal-header">
          <h5 class="modal-title">Cập nhật route</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label">Route</label>
              <input class="form-control"
                     [(ngModel)]="editRoute.route" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Mô tả</label>
              <input class="form-control"
                     [(ngModel)]="editRoute.description" />
            </div>

          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button class="btn btn-dark"
                  (click)="submitUpdateRoute(editRoute.id)">
            Cập nhật
          </button>
        </div>

      </ng-container>

    </div>
  </div>
</div>
