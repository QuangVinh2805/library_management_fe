<div class="card shadow">

  <div class="card-header">
    <span class="fw-bold">Phân quyền hệ thống</span>
  </div>

  <div class="card-body">
    <div class="d-flex justify-content-end mb-2">
      <button class="btn btn-sm btn-dark"
              *ngIf="
    (activeTab === 'ROLE' && canCreatePermissionRole)"
              (click)="openAssignModal()">
        + Gán permission
      </button>
    </div>


    <!-- TAB -->
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <button class="nav-link"
                [class.active]="activeTab === 'ROLE'"
                (click)="switchTab('ROLE')">
          Danh sách Role
        </button>
      </li>
    </ul>

    <!-- ROLE LIST -->
    <div *ngIf="activeTab === 'ROLE'" class="mb-4">
      <div class="list-group">
        <button class="list-group-item list-group-item-action"
                *ngFor="let r of roles"
                [class.active]="r.id === selectedRoleId"
                (click)="selectRole(r.id)">
          {{ r.roleName }}
        </button>
      </div>

      <!-- ROLE PAGING -->
      <nav *ngIf="roleTotalPages > 1" class="mt-2">
        <ul class="pagination pagination-sm">
          <li class="page-item" [class.disabled]="rolePage === 0">
            <button class="page-link" (click)="changeRolePage(rolePage - 1)">«</button>
          </li>

          <li class="page-item"
              *ngFor="let p of [].constructor(roleTotalPages); let i = index"
              [class.active]="i === rolePage">
            <button class="page-link" (click)="changeRolePage(i)">
              {{ i + 1 }}
            </button>
          </li>

          <li class="page-item" [class.disabled]="rolePage === roleTotalPages - 1">
            <button class="page-link" (click)="changeRolePage(rolePage + 1)">»</button>
          </li>
        </ul>
      </nav>
    </div>

    <div class="d-flex justify-content-end mb-2" *ngIf="selectedRoleId">
      <input
        type="text"
        class="form-control w-25"
        placeholder="Tìm permission..."
        [(ngModel)]="permissionSearchKeyword"
        (keyup.enter)="searchPermission()"
      />
    </div>


    <!-- PERMISSION TABLE -->
    <div *ngIf="!loading && permissions.length > 0" class="table-responsive">
      <table class="table table-hover">
        <thead>
        <tr>
          <th>Tên</th>
<!--          <th>Endpoint</th>-->
<!--          <th>Method</th>-->
          <th>Route</th>
          <th>Mô tả</th>
          <th>Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let p of permissions">
          <td>{{ p.name }}</td>
<!--          <td>{{ p.endPoint }}</td>-->
<!--          <td>-->
<!--            <span class="badge bg-dark">{{ p.method }}</span>-->
<!--          </td>-->
          <td>{{ p.route }}</td>
          <td>{{ p.description }}</td>
          <td>
            <button class="btn btn-sm btn-outline-danger"
                    *ngIf="
    (activeTab === 'ROLE' && canRemovePermissionRole) ||
    (activeTab === 'USER' && canRemovePermissionUser)
  "
                    (click)="openConfirmDelete(p.id)">
              <i class="bi bi-trash"></i>
            </button>
          </td>

        </tr>
        </tbody>
      </table>

      <!-- PERMISSION PAGING -->
      <nav *ngIf="permissionTotalPages > 1">
        <ul class="pagination justify-content-center">
          <li class="page-item" [class.disabled]="permissionPage === 0">
            <button class="page-link" (click)="changePermissionPage(permissionPage - 1)">«</button>
          </li>

          <li class="page-item"
              *ngFor="let p of [].constructor(permissionTotalPages); let i = index"
              [class.active]="i === permissionPage">
            <button class="page-link" (click)="changePermissionPage(i)">
              {{ i + 1 }}
            </button>
          </li>

          <li class="page-item" [class.disabled]="permissionPage === permissionTotalPages - 1">
            <button class="page-link" (click)="changePermissionPage(permissionPage + 1)">»</button>
          </li>
        </ul>
      </nav>
    </div>

    <!-- EMPTY -->
    <div *ngIf="!loading && permissions.length === 0" class="text-center text-muted py-3">
      Chưa có permission
    </div>

  </div>

  <!-- ASSIGN PERMISSION MODAL -->
  <div class="modal fade show d-block"
       *ngIf="showAssignModal"
       style="background: rgba(0,0,0,.5)">

    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">
            Gán Permission
            <span class="badge bg-secondary ms-2">
            {{ activeTab === 'ROLE' ? 'ROLE' : 'USER' }}
          </span>
          </h5>
          <button class="btn-close"
                  (click)="closeAssignModal()"></button>
        </div>

        <div class="modal-body">

          <div class="mb-3 position-relative">
            <label class="form-label fw-bold">Permission</label>

            <input
              type="text"
              class="form-control"
              placeholder="Nhập tên / code / route permission..."
              [(ngModel)]="permissionKeyword"
              (input)="filterPermission()"
            />


            <!-- DROPDOWN -->
            <div style="max-height: 400px; overflow-y: auto">

              <div *ngFor="let p of filteredPermissions" class="form-check border-bottom py-2">

                <input
                  type="checkbox"
                  class="form-check-input"
                  [checked]="selectedPermissionIds.includes(p.id)"
                  (change)="togglePermission(p.id, $event.target.checked)"
                />

                <label class="form-check-label w-100" [for]="'per_' + p.id">

                  <div class="fw-bold">{{ p.name }}</div>

                  <small class="text-muted">
                    {{ p.method }} {{ p.route }}
                  </small>

                </label>

              </div>

            </div>
          </div>


        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary"
                  (click)="closeAssignModal()">
            Hủy
          </button>
          <button class="btn btn-dark"
                  (click)="assignPermission()">
            Gán
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE MODAL -->
  <div class="modal fade show d-block"
       *ngIf="showConfirmDeleteModal"
       style="background: rgba(0,0,0,.5)">

    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title text-danger">
            Xác nhận xoá
          </h5>
          <button class="btn-close"
                  (click)="closeConfirmDelete()"></button>
        </div>

        <div class="modal-body text-center">
          <p class="mb-0">
            Bạn có chắc chắn muốn xoá permission này không?
          </p>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary"
                  (click)="closeConfirmDelete()">
            Huỷ
          </button>

          <button class="btn btn-danger"
                  (click)="confirmDeletePermission()">
            Xoá
          </button>
        </div>

      </div>
    </div>
  </div>


</div>
