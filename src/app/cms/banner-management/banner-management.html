<div class="card shadow">

  <div class="card-header d-flex justify-content-between align-items-center">
    <span class="fw-bold">Tất cả Banner</span>
    <button *ngIf="canCreate" class="btn btn-light btn-sm border" (click)="openCreateModal()">
      <i class="bi bi-plus-circle"></i> Thêm mới
    </button>
  </div>

  <div class="card-body">

    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-dark"></div>
    </div>

    <div *ngIf="!loading" class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
          <th>Icon</th>
          <th>Chủ đề</th>
          <th>Mô tả</th>
          <th>Trạng thái</th>
          <th class="text-center" style="width: 160px;">Chức năng</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let b of banners">

          <td>
            <img [src]="'http://localhost:8177' + b.image"
                 alt="" width="90" height="120" class="rounded border">
          </td>
          <td>{{ b.title }}</td>
          <td>{{ b.description }}</td>

          <td>
            <span [ngClass]="b.status === 1 ? 'badge bg-success' : 'badge bg-secondary'">
              {{ b.status === 1 ? 'Hoạt động' : 'Khoá' }}
            </span>
          </td>

          <td class="text-center">

            <button *ngIf="canUpdate" class="btn btn-sm btn-outline-primary me-1"
                    (click)="openEditModal(b)">
              <i class="bi bi-pencil-square"></i>
            </button>

            <button *ngIf="canChangeStatus" class="btn btn-sm btn-outline-warning me-1"
                    (click)="toggleStatus(b.id)">
              <i class="bi" [ngClass]="b.status === 1 ? 'bi-slash-circle' : 'bi-check-circle'"></i>
            </button>

          </td>
        </tr>
        </tbody>

      </table>
    </div>
  </div>
</div>


<div class="modal fade" id="createBannerModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Thêm banner mới</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Chủ đề</label>
            <input type="text" class="form-control"
                   [(ngModel)]="newBanner.title">
          </div>

          <div class="col-md-3">
            <label class="form-label">Mô tả</label>
            <input type="text" class="form-control"
                   [(ngModel)]="newBanner.description">
          </div>


          <div class="col-12">
            <label class="form-label">Ảnh sản phẩm</label>
            <input type="file" class="form-control" (change)="onImageSelected($event)">
          </div>

          <!-- Preview ảnh -->
          <div class="col-12" *ngIf="imagePreview">
            <p class="mt-2 fw-bold">Preview:</p>
            <img [src]="imagePreview"
                 class="img-thumbnail" width="120">
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary"
                data-bs-dismiss="modal">Hủy</button>
        <button type="button" class="btn btn-dark"
                (click)="submitCreateBanner()">Tạo mới</button>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="updateBannerModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Cập nhật Banner </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" *ngIf="editBanner">

        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Chủ đề</label>
            <input type="text" class="form-control"
                   [(ngModel)]="editBanner.title">
          </div>

          <div class="col-md-3">
            <label class="form-label">Mô tả</label>
            <input type="text" class="form-control"
                   [(ngModel)]="editBanner.description">
          </div>


          <div class="col-12">
            <label class="form-label">Đổi ảnh (nếu muốn)</label>
            <input type="file" class="form-control"
                   (change)="onEditImageSelected($event)">
          </div>

          <div class="col-12" *ngIf="editImagePreview">
            <p class="mt-2 fw-bold">Preview:</p>
            <img [src]="editImagePreview"
                 class="img-thumbnail" width="120">
          </div>

        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary"
                data-bs-dismiss="modal">Hủy</button>

        <button type="button" class="btn btn-dark"
                (click)="submitUpdateBanner()">Cập nhật</button>
      </div>

    </div>
  </div>
</div>
