 <div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 16px;">
    <div class="logo" routerLink="/reader">Thư viện Sao Việt</div>
    <h3 class="text-center mb-4 fw-bold">Đăng nhập</h3>

    <form (ngSubmit)="onSubmit()"
          #loginForm="ngForm"
          novalidate>

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Email</label>

        <input type="email"
               name="email"
               class="form-control"
               required
               email
               [(ngModel)]="loginData.email"
               #email="ngModel" />

        <!-- Validate message -->
        <div class="text-danger small mt-1"
             *ngIf="email.invalid && (email.dirty || email.touched)">

          <div *ngIf="email.errors?.['required']">
            Email không được để trống
          </div>

          <div *ngIf="email.errors?.['email']">
            Email không đúng định dạng
          </div>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Mật khẩu</label>

        <input type="password"
               name="password"
               class="form-control"
               required
               [(ngModel)]="loginData.password"
               #password="ngModel" />

        <div class="text-danger small mt-1"
             *ngIf="password.invalid && (password.dirty || password.touched)">
          Mật khẩu không được để trống
        </div>
      </div>

      <div class="links-row">
        <span class="register-link" routerLink="/register">Bạn chưa có tài khoản?</span>
        <span class="reset-password-link" routerLink="/reset-password/reader">Quên mật khẩu?</span>
      </div>

      <!-- SUBMIT -->
      <button type="submit"
              class="btn btn-login w-100 mt-2"
              [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>

      <div *ngIf="errorMessage"
           class="alert alert-danger mt-3 text-center py-2">
        {{ errorMessage }}
      </div>

    </form>

  </div>
</div>
